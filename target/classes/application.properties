spring.application.name=DataPlate

spring.datasource.url=jdbc:postgresql://localhost:5432/DataPlate
spring.datasource.username=postgres
spring.datasource.password=123456
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

server.port=8080

dataplate.jwt.secret=${JWT_SECRET:DataPlateJwtSecretKeyForDevelopmentOnlyChangeMe123456789}
dataplate.jwt.expiration-ms=86400000

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
