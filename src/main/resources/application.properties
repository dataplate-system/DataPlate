spring.application.name=DataPlate
spring.config.import=optional:file:.env[.properties]

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:data_plate}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:1234}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=5000
spring.datasource.hikari.idle-timeout=180000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.connection-init-sql=SELECT 1
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

server.port=${PORT:8080}

spring.web.resources.cache.period=0
spring.web.resources.cache.cachecontrol.no-cache=true

dataplate.jwt.secret=${JWT_SECRET:DataPlateJwtSecretKeyForDevelopmentOnlyChangeMe123456789}
dataplate.jwt.expiration-ms=86400000
dataplate.jwt.refresh-secret=${JWT_REFRESH_SECRET:${dataplate.jwt.secret}}
dataplate.jwt.refresh-expiration-ms=604800000
dataplate.allowed-origins=${ALLOWED_ORIGINS:https://dataplate.fly.dev,http://localhost:5500,http://127.0.0.1:5500,http://localhost:8080,http://127.0.0.1:8080,http://localhost:5173,http://127.0.0.1:5173}

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

logging.level.org.springframework.security.config.annotation.authentication.configuration.InitializeUserDetailsBeanManagerConfigurer=ERROR

spring.security.user.name=admin
spring.security.user.password=admin
