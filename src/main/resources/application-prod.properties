spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:data_plate}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DB_USER:postgres}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:}}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=never
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

server.port=${PORT:8080}

dataplate.jwt.secret=${JWT_SECRET}
dataplate.jwt.refresh-secret=${JWT_REFRESH_SECRET:${JWT_SECRET}}
dataplate.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
dataplate.jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}
dataplate.allowed-origins=${ALLOWED_ORIGINS:https://dataplate.onrender.com}
