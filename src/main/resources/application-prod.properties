spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?sslmode=require&sslfactory=org.postgresql.ssl.NonValidatingFactory
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate
spring.sql.init.mode=never

dataplate.jwt.secret=${JWT_SECRET}
dataplate.jwt.refresh-secret=${JWT_REFRESH_SECRET}
dataplate.allowed-origins=${ALLOWED_ORIGINS}

spring.security.user.name=${ADMIN_USER:admin}
spring.security.user.password=${ADMIN_PASSWORD}